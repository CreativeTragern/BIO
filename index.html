<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativeTragern</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  background: radial-gradient(circle at 50% 50%, #0a0a2a 0%, #000 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

/* Card */
.card {
  position: relative;
  width: 90%;
  max-width: 420px;
  background: rgba(15, 15, 30, 0.75);
  backdrop-filter: blur(25px);
  border-radius: 24px;
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0, 150, 255, 0.5);
  animation: fadeIn 1.2s ease;
  z-index: 2;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 20px;
  box-shadow: 0 0 40px #00bfff;
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 20px #00bfff; }
  50%      { box-shadow: 0 0 60px #00bfff; }
}

.nickname {
  font-size: clamp(28px, 7vw, 38px);
  color: #00d4ff;
  margin-bottom: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  animation: glitch 3s infinite;
}

@keyframes glitch {
  0%   { text-shadow: 2px 2px #0088ff, -2px -2px #00ffff; }
  25%  { text-shadow: -2px 2px #00ffff, 2px -2px #ff00cc; }
  50%  { text-shadow: 2px -2px #0088ff, -2px 2px #00ffff; }
  75%  { text-shadow: -2px -2px #00ffff, 2px 2px #ff00cc; }
  100% { text-shadow: 2px 2px #0088ff, -2px -2px #00ffff; }
}

.description {
  font-size: clamp(14px, 4vw, 16px);
  opacity: 0.9;
  margin: 15px 0 25px;
  line-height: 1.5;
}

.support-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #00bfff, #0077ff);
  color: white;
  padding: 12px 28px;
  border-radius: 50px;
  font-size: clamp(15px, 4vw, 17px);
  font-weight: 500;
  text-decoration: none;
  margin: 20px 0;
  transition: all 0.35s;
  box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
}

.support-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 35px rgba(0, 191, 255, 0.8);
  background: linear-gradient(135deg, #00eaff, #0099ff);
}

.support-btn i {
  font-size: clamp(20px, 5vw, 22px);
}

.socials {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
  margin-top: 15px;
}

.socials a {
  font-size: clamp(22px, 6vw, 26px);
  color: #00bfff;
  transition: 0.3s;
}

.socials a:hover {
  color: white;
  transform: scale(1.25);
  text-shadow: 0 0 15px #00bfff;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Адаптивність */
@media (max-width: 480px) {
  .card {
    padding: 35px 18px;
    border-radius: 20px;
  }
  .avatar {
    width: 100px;
    height: 100px;
  }
  .support-btn {
    padding: 10px 24px;
  }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="card">
  <img class="avatar" src="https://r2.guns.lol/c8ae1efb-1282-4d65-ab3d-05fd218a792d.webp" alt="avatar">

  <div class="nickname">CreativeTragern</div>

  <div class="description">
    Creative | Код, ігри, сервери та трохи хаосу<br>
    📍 Ukraine
  </div>

  <a href="https://creativetragern.github.io/CR-SUPPORT/" target="_blank" class="support-btn">
    <i class="fa-solid fa-server"></i>
    ДОПОМОГА З НАЛАШТУВАННЯМ СЕРВЕРУ
  </a>

  <div class="socials">
    <a href="https://discord.com/invite/f24h3Ucx" target="_blank"><i class="fab fa-discord"></i></a>
    <a href="https://www.youtube.com/@creativetragern" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://steamcommunity.com/id/CreativeTragern_Official" target="_blank"><i class="fab fa-steam"></i></a>
    <a href="https://www.tiktok.com/@creativetragern" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://github.com/CreativeTragern" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://www.roblox.com/users/1311506981/profile" target="_blank"><i class="fas fa-cube"></i></a>
    <a href="https://www.twitch.tv/@creativetragern" target="_blank"><i class="fab fa-twitch"></i></a>
  </div>
</div>

<script>
// Particles + cursor trail
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let stars = [];
for(let i = 0; i < 140; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.8 + 0.4,
    speed: Math.random() * 0.4 + 0.15
  });
}

let cursorParticles = [];
let mouse = { x: canvas.width/2, y: canvas.height/2 };

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  for(let i = 0; i < 3; i++) {
    cursorParticles.push({
      x: mouse.x,
      y: mouse.y,
      size: Math.random() * 3 + 1,
      alpha: 1,
      dx: (Math.random() - 0.5) * 1.4,
      dy: (Math.random() - 0.5) * 1.4
    });
  }
});

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
    s.y -= s.speed;
    if (s.y < 0) {
      s.y = canvas.height;
      s.x = Math.random() * canvas.width;
    }
  });

  cursorParticles = cursorParticles.filter(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 200, 255, ${p.alpha})`;
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    p.alpha -= 0.022;
    return p.alpha > 0;
  });

  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  resizeCanvas();
});
</script>
</body>
</html>
